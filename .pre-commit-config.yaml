repos:

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: bash -c 'test -z "$(gofmt -l .)"'
        language: system
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
