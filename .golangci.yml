version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - bodyclose
    - noctx
    - godot

linters-settings:
  goimports:
    local-prefixes: github.com/NoTIPswe/notip-simulator-cli

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
